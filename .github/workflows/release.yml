name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build archives
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          module="github.com/tripsyapp/cli/internal/cli"
          ldflags="-s -w -X ${module}.Version=${version} -X ${module}.Commit=${GITHUB_SHA} -X ${module}.Date=${date}"
          platforms=(
            darwin/amd64
            darwin/arm64
            linux/amd64
            linux/arm64
            freebsd/amd64
            freebsd/arm64
            openbsd/amd64
            openbsd/arm64
            windows/amd64
            windows/arm64
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            name="tripsy_${version}_${os}_${arch}"
            outdir="dist/${name}"
            cli_binary="tripsy"
            mcp_binary="tripsy-mcp"
            archive="${name}.tar.gz"

            if [[ "$os" == "windows" ]]; then
              cli_binary="tripsy.exe"
              mcp_binary="tripsy-mcp.exe"
              archive="${name}.zip"
            fi

            mkdir -p "$outdir"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "${outdir}/${cli_binary}" ./cmd/tripsy
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "${outdir}/${mcp_binary}" ./cmd/tripsy-mcp
            cp README.md LICENSE "$outdir/"

            if [[ "$os" == "windows" ]]; then
              (cd "$outdir" && zip -q "../${archive}" ./*)
            else
              tar -C "$outdir" -czf "dist/${archive}" .
            fi
          done

          (cd dist && shasum -a 256 *.tar.gz *.zip > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip dist/checksums.txt --generate-notes --verify-tag
